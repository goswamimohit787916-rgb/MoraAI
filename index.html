<!DOCTYPE html>
<html>
<head>
<title>MoraAI</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<!-- LOGIN -->
<div id="loginPage" class="flex items-center justify-center h-screen">
  <div class="bg-white p-8 rounded-xl shadow w-80">
    <h2 class="text-xl font-bold mb-4">Login</h2>
    <input id="email" placeholder="Email" class="w-full mb-2 p-2 border rounded">
    <input id="password" placeholder="Password" class="w-full mb-2 p-2 border rounded">
    <button onclick="login()" class="w-full bg-blue-600 text-white p-2 rounded mb-2">Login</button>
    <button onclick="signup()" class="w-full bg-gray-300 p-2 rounded">Signup</button>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden flex h-screen">

  <!-- SIDEBAR -->
  <div class="w-64 bg-white p-4 border-r">
    <h2 class="font-bold text-lg mb-4">Generate</h2>
    <p>Voices</p>
    <p>Projects</p>
    <p>Settings</p>
  </div>

  <!-- MAIN -->
  <div class="flex-1 p-6">

    <div class="flex justify-between mb-4">
      <div>Credits: <b id="credits">0</b></div>
      <button onclick="pay()" class="bg-blue-600 text-white px-4 py-2 rounded">Upgrade</button>
    </div>

    <textarea id="text" class="w-full h-40 p-4 border rounded mb-4"
      placeholder="Enter your text..."></textarea>

    <button onclick="generate()" class="bg-blue-600 text-white px-6 py-2 rounded">
      Generate
    </button>

    <div class="mt-6 bg-white p-4 rounded shadow">
      <audio id="audio" controls class="w-full"></audio>
    </div>

  </div>
</div>

<script src="app.js"></script>
</body>
</html>
