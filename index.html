<!DOCTYPE html>
<html>
<head>
<title>MoraAI</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white">

<!-- LOGIN -->
<div id="loginPage" class="flex items-center justify-center h-screen">
  <div class="bg-white/10 p-6 rounded">
    <input id="email" placeholder="Email" class="block mb-2 text-black">
    <input id="password" placeholder="Password" class="block mb-2 text-black">
    <button onclick="login()" class="bg-blue-600 px-4 py-2">Login</button>
    <button onclick="signup()" class="bg-gray-600 px-4 py-2">Signup</button>
    <p id="status"></p>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden p-6">
  Credits: <span id="credits">0</span><br><br>

  <textarea id="text" class="w-full h-32 text-black"></textarea><br>

  <button onclick="generate()" class="bg-blue-600 px-4 py-2">Generate</button>
  <button onclick="showPayment()" class="bg-green-600 px-4 py-2">Upgrade</button>

  <audio id="audio" controls></audio>
</div>

<!-- PAYMENT -->
<div id="pay" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center">
  <div class="bg-white text-black p-6">
    <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa=yourupi@upi">
    <button onclick="verify()">I Paid</button>
  </div>
</div>

<script>

const API = "https://backend.goswamimohit787916.workers.dev/";

let uid = localStorage.getItem("uid");

if(uid){ showApp(); loadUser(); }

function showApp(){
  loginPage.style.display="none";
  app.style.display="block";
}

async function signup(){
  let r = await fetch(API+"/signup",{method:"POST",headers:{"Content-Type":"application/json"},
  body:JSON.stringify({email:email.value,password:password.value})});
  status.innerText="Created";
}

async function login(){
  let r = await fetch(API+"/login",{method:"POST",headers:{"Content-Type":"application/json"},
  body:JSON.stringify({email:email.value,password:password.value})});
  let d = await r.json();
  if(d.ok){
    uid=d.uid;
    localStorage.setItem("uid",uid);
    showApp();
    loadUser();
  }
}

async function loadUser(){
  let r = await fetch(API+"/user?uid="+uid);
  let d = await r.json();
  credits.innerText=d.user.credits;
}

async function generate(){
  let r = await fetch(API+"/generate",{method:"POST",headers:{"Content-Type":"application/json"},
  body:JSON.stringify({uid,text:text.value})});
  let d = await r.json();
  if(d.ok){
    audio.src=d.audio;
    credits.innerText=d.remaining;
  }
}

function showPayment(){ pay.style.display="flex"; }

async function verify(){
  await fetch(API+"/verify-payment",{method:"POST",headers:{"Content-Type":"application/json"},
  body:JSON.stringify({uid})});
  loadUser();
  pay.style.display="none";
}

</script>

</body>
</html>
