<!DOCTYPE html>
<html>
<head>
<title>MoraAI</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white">

<!-- TOAST -->
<div id="toast" class="hidden fixed bottom-5 right-5 bg-white text-black px-4 py-2 rounded"></div>

<!-- LOGIN -->
<div id="loginPage" class="flex items-center justify-center h-screen">
  <div class="bg-white/10 p-6 rounded">
    <input id="email" placeholder="Email" class="block mb-2 text-black">
    <input id="password" placeholder="Password" class="block mb-2 text-black">
    <button onclick="login()" class="bg-blue-600 px-4 py-2">Login</button>
    <button onclick="signup()" class="bg-gray-600 px-4 py-2">Signup</button>
    <p id="status"></p>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden p-6">

  Credits: <span id="credits">0</span>

  <textarea id="text" class="w-full h-32 text-black mt-4"></textarea>

  <button onclick="generate(event)" class="bg-blue-600 px-4 py-2 mt-2">
    Generate
  </button>

  <button onclick="showPayment()" class="bg-green-600 px-4 py-2 mt-2">
    Upgrade
  </button>

  <div class="mt-4 h-1 bg-gray-700">
    <div id="progress" class="h-1 bg-blue-500 w-0"></div>
  </div>

  <audio id="audio" class="hidden"></audio>

</div>

<!-- PAYMENT -->
<div id="pay" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center">
  <div class="bg-white text-black p-6 text-center">
    <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa=yourupi@upi">
    <p>UPI: yourupi@upi</p>
    <button onclick="verify()">I Paid</button>
  </div>
</div>

<script>

const API = "https://backend.goswamimohit787916.workers.dev/";

let uid = localStorage.getItem("uid");
let audio = new Audio();

if(uid){ showApp(); loadUser(); }

// UI
function showApp(){
  loginPage.style.display="none";
  app.style.display="block";
}

function showToast(msg){
  toast.innerText=msg;
  toast.style.display="block";
  setTimeout(()=>toast.style.display="none",3000);
}

// AUTH
async function signup(){
  await fetch(API+"/signup",{method:"POST",headers:{"Content-Type":"application/json"},
  body:JSON.stringify({email:email.value,password:password.value})});
  showToast("Account created");
}

async function login(){
  let r = await fetch(API+"/login",{method:"POST",headers:{"Content-Type":"application/json"},
  body:JSON.stringify({email:email.value,password:password.value})});
  let d = await r.json();

  if(d.ok){
    uid=d.uid;
    localStorage.setItem("uid",uid);
    showApp();
    loadUser();
  } else showToast("Invalid login");
}

// USER
async function loadUser(){
  let r = await fetch(API+"/user?uid="+uid);
  let d = await r.json();
  credits.innerText=d.user.credits;
}

// GENERATE (interactive)
async function generate(e){

  if(!text.value){
    showToast("Enter text");
    return;
  }

  let btn = e.target;
  btn.innerText="Generating...";
  btn.disabled=true;

  let r = await fetch(API+"/generate",{method:"POST",headers:{"Content-Type":"application/json"},
  body:JSON.stringify({uid,text:text.value})});

  let d = await r.json();

  btn.innerText="Generate";
  btn.disabled=false;

  if(d.ok){
    audio.src=d.audio;
    audio.play();
    credits.innerText=d.remaining;
    showToast("Done");
  } else showToast(d.error);
}

// PROGRESS
audio.ontimeupdate=()=>{
  let p=(audio.currentTime/audio.duration)*100;
  progress.style.width=p+"%";
};

// PAYMENT
function showPayment(){ pay.style.display="flex"; }

async function verify(){
  await fetch(API+"/verify-payment",{method:"POST",headers:{"Content-Type":"application/json"},
  body:JSON.stringify({uid})});
  loadUser();
  pay.style.display="none";
  showToast("Credits added");
}

</script>

</body>
</html>
