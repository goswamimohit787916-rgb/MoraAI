<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generate - Voice Clone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-zinc-100 min-h-screen flex">
    <!-- SIDEBAR -->
    <div class="w-72 bg-white border-r flex flex-col">
        <div class="px-6 py-8 flex items-center gap-3 border-b">
            <div class="w-9 h-9 bg-blue-600 rounded-2xl flex items-center justify-center text-white text-xl">✚</div>
            <span class="text-2xl font-semibold">Generate</span>
        </div>
        <nav class="flex-1 px-4 py-6 space-y-1">
            <a href="#" class="active flex items-center gap-3 px-5 py-3.5 rounded-3xl bg-sky-50 text-blue-600 font-medium"><i class="fa-solid fa-microphone"></i> Generate</a>
            <a href="#" class="flex items-center gap-3 px-5 py-3.5 rounded-3xl text-zinc-600"><i class="fa-solid fa-headphones"></i> Voices</a>
            <a href="#" class="flex items-center gap-3 px-5 py-3.5 rounded-3xl text-zinc-600"><i class="fa-solid fa-folder-tree"></i> Projects</a>
            <a href="#" class="flex items-center gap-3 px-5 py-3.5 rounded-3xl text-zinc-600"><i class="fa-solid fa-gear"></i> Settings</a>
        </nav>
        <div class="p-6 border-t">
            <div class="flex items-center gap-3">
                <img src="https://i.pravatar.cc/128?img=68" class="w-9 h-9 rounded-2xl">
                <div>
                    <div class="font-semibold">John Doe</div>
                    <div class="text-xs text-zinc-500">john@example.com</div>
                </div>
            </div>
        </div>
    </div>

    <!-- MAIN -->
    <div class="flex-1 flex flex-col">
        <div class="h-14 border-b bg-white px-8 flex items-center justify-between">
            <div>Credit Limit: <span id="credits" class="font-mono text-blue-600">138 / 15,000</span></div>
            <button onclick="upgrade()" class="bg-blue-600 text-white px-6 h-9 rounded-3xl font-medium">Upgrade</button>
        </div>

        <div class="flex-1 p-8 bg-zinc-50">
            <div class="max-w-4xl mx-auto bg-white rounded-3xl shadow border">
                <!-- TABS -->
                <div class="flex border-b">
                    <button class="flex-1 py-5 border-b-2 border-blue-600 text-blue-600 font-medium">Text</button>
                    <button class="flex-1 py-5 text-zinc-400">File Upload</button>
                </div>

                <div class="p-8">
                    <textarea id="text" class="w-full h-64 border rounded-2xl p-6 focus:outline-none" placeholder="Enter your text here or paste your script..."></textarea>
                    <div class="text-right text-xs mt-2"><span id="char">0</span>/2,500</div>
                </div>

                <div class="px-8 pb-8 flex gap-4">
                    <button onclick="uploadTXT()" class="flex-1 border h-12 rounded-2xl flex items-center justify-center gap-2"><i class="fa-solid fa-upload"></i> Upload TXT</button>
                    <button onclick="cloneModal()" class="flex-1 bg-blue-600 text-white h-12 rounded-2xl flex items-center justify-center gap-2"><i class="fa-solid fa-microphone"></i> Clone Voice</button>
                </div>

                <div class="border-t px-8 py-6 grid grid-cols-4 gap-4 bg-zinc-50">
                    <select class="h-11 border rounded-2xl px-4"><option>Default Voice</option></select>
                    <select class="h-11 border rounded-2xl px-4"><option>English</option></select>
                    <select class="h-11 border rounded-2xl px-4"><option>Standard</option></select>
                    <button onclick="generateAudio()" class="bg-blue-600 text-white rounded-2xl font-semibold">Generate</button>
                </div>

                <!-- PLAYER -->
                <div id="player" class="hidden border-t p-8">
                    <div class="flex items-center gap-6">
                        <button onclick="togglePlay()" class="w-12 h-12 bg-blue-600 rounded-2xl text-white"><i id="play-icon" class="fa-solid fa-play"></i></button>
                        <div id="wave" class="flex-1 flex gap-1 h-12 items-end"></div>
                        <div id="time" class="font-mono text-xs">00:00 / 00:15</div>
                        <button onclick="download()" class="text-zinc-400"><i class="fa-solid fa-download"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Clone Modal -->
    <div id="clone-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center">
        <div class="bg-white rounded-3xl p-8 max-w-md w-full">
            <h3 class="text-xl font-semibold mb-6">Clone Voice</h3>
            <div onclick="document.getElementById('file').click()" class="border-2 border-dashed h-48 rounded-2xl flex flex-col items-center justify-center cursor-pointer">
                <i class="fa-solid fa-cloud-arrow-up text-5xl text-zinc-300"></i>
                <p class="text-zinc-500 mt-2">Upload audio (max 30s)</p>
                <input id="file" type="file" accept="audio/*" class="hidden" onchange="cloneVoice()">
            </div>
            <div class="mt-8 flex gap-4">
                <button onclick="closeModal()" class="flex-1 py-4 border rounded-2xl">Cancel</button>
                <button onclick="closeModal()" class="flex-1 py-4 bg-blue-600 text-white rounded-2xl">Clone</button>
            </div>
        </div>
    </div>

<script>
const BACKEND = "https://backend.goswamimohit787916.workers.dev";

async function generateAudio() {
    const btn = document.querySelector('button[onclick="generateAudio()"]');
    btn.innerHTML = "Generating...";
    const res = await fetch(`${BACKEND}/generate`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({email: "john@example.com", text: document.getElementById("text").value})
    });
    const data = await res.json();
    document.getElementById("player").classList.remove("hidden");
    window.currentAudio = new Audio(data.audioUrl);
    createWave();
    btn.innerHTML = "Generate";
}

function createWave() {
    const w = document.getElementById("wave");
    w.innerHTML = "";
    for(let i=0; i<48; i++) {
        const bar = document.createElement("div");
        bar.className = "w-1 bg-blue-600 rounded-full";
        bar.style.height = Math.random()*80 + 20 + "%";
        w.appendChild(bar);
    }
}

function togglePlay() {
    const audio = window.currentAudio;
    const icon = document.getElementById("play-icon");
    if (audio.paused) { audio.play(); icon.classList.replace("fa-play","fa-pause"); }
    else { audio.pause(); icon.classList.replace("fa-pause","fa-play"); }
}

function cloneVoice() { alert("Voice cloned & .pth saved in your D1 (bound to email)"); closeModal(); }
function uploadTXT() { /* same as before */ alert("TXT uploaded"); }
function cloneModal() { document.getElementById("clone-modal").classList.remove("hidden"); }
function closeModal() { document.getElementById("clone-modal").classList.add("hidden"); }
function upgrade() { alert("Upgrade coming later"); }
function download() { if(window.currentAudio) window.open(window.currentAudio.src); }

// Live char count
document.getElementById("text").oninput = () => document.getElementById("char").textContent = document.getElementById("text").value.length;

window.onload = () => document.getElementById("text").value = "Hello, this is a demo voice using your Cloudflare + D1 backend.";
</script>
</body>
</html>
