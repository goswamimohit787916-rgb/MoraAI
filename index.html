<!DOCTYPE html>
<html>
<head>
<title>MoraAI</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#0b0f19] text-white">

<!-- LOGIN -->
<div id="loginPage" class="flex items-center justify-center h-screen">
  <div class="bg-[#111827] p-8 rounded-2xl w-80">
    <h2 class="text-xl font-bold mb-4">MoraAI</h2>
    <input id="email" placeholder="Email" class="w-full mb-2 p-2 rounded bg-black">
    <input id="password" placeholder="Password" class="w-full mb-2 p-2 rounded bg-black">
    <button onclick="login()" class="w-full bg-indigo-600 p-2 rounded mt-2">Login</button>
    <button onclick="signup()" class="w-full bg-gray-700 p-2 rounded mt-2">Signup</button>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden flex h-screen">

  <!-- SIDEBAR -->
  <div class="w-64 bg-[#111827] p-6 flex flex-col">
    <h2 class="text-xl font-bold mb-6">Generate</h2>

    <div class="space-y-4 text-gray-400">
      <div>🎤 Generate</div>
      <div>🎧 Voices</div>
      <div>📁 Projects</div>
      <div>⚙️ Settings</div>
    </div>

    <div class="mt-auto text-sm text-gray-500">
      Credits: <span id="credits">0</span>
    </div>
  </div>

  <!-- MAIN -->
  <div class="flex-1 p-8">

    <!-- TOP -->
    <div class="flex justify-between mb-6">
      <div class="text-gray-400">Generate Voice</div>
      <button onclick="pay()" class="bg-indigo-600 px-4 py-2 rounded">Upgrade</button>
    </div>

    <!-- TEXT -->
    <textarea id="text" placeholder="Enter your text..."
      class="w-full h-40 p-4 rounded-xl bg-[#111827]"></textarea>

    <!-- ACTION -->
    <div class="flex gap-4 mt-4">
      <button onclick="generate()" class="bg-indigo-600 px-6 py-2 rounded">Generate</button>
      <button onclick="openClone()" class="bg-gray-700 px-6 py-2 rounded">Clone Voice</button>
    </div>

    <!-- VOICE CARDS -->
    <div class="mt-6 grid grid-cols-3 gap-4" id="voices">
      <!-- Dynamic -->
    </div>

    <!-- PLAYER -->
    <div class="mt-8 bg-[#111827] p-6 rounded-xl">
      <button onclick="togglePlay()" id="playBtn" class="bg-indigo-600 p-3 rounded-full">▶</button>

      <div class="flex items-end gap-1 mt-4 h-16" id="wave"></div>

      <audio id="audio"></audio>
    </div>

  </div>
</div>

<!-- CLONE MODAL -->
<div id="cloneModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center">

  <div class="bg-[#111827] p-6 rounded-xl w-96">

    <h3 class="mb-4">Clone Voice</h3>

    <div id="drop"
      class="border-2 border-dashed border-gray-500 p-10 text-center rounded cursor-pointer">
      Drop audio here
    </div>

    <button onclick="uploadVoice()" class="mt-4 bg-indigo-600 px-4 py-2 rounded w-full">
      Upload
    </button>

    <button onclick="closeClone()" class="mt-2 text-gray-400 w-full">Cancel</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
